version: "3.9"

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: ${PROJECT_BASE_PATH}/.env
    volumes:
      - ${PROJECT_BASE_PATH}/${DB_Path}:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: python:3.12-slim
    restart: unless-stopped
    working_dir: /app
    env_file: ${PROJECT_BASE_PATH}/.env
    environment:
      VIRTUAL_ENV: /venv
      PATH: /venv/bin:/usr/local/bin:/usr/bin:/bin
    volumes:
      - ${PROJECT_BASE_PATH}/${BACKEND_BASE_PATH}:/app
      - ${PROJECT_BASE_PATH}/${PYTHON_ENV_PATH}:/venv
      - ${PROJECT_BASE_PATH}${IMPORT_BASE_PATH}:${IMPORT_BASE_PATH}
      - ${PROJECT_BASE_PATH}${STORAGE_PATH}:${STORAGE_PATH}
      - ${PROJECT_BASE_PATH}${EXPORT_BASE_PATH}:${EXPORT_BASE_PATH}
    ports:
      - "${BACKEND_PORT}:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        test -f /venv/bin/activate || python -m venv /venv &&
        /venv/bin/pip install -q -r requirements.txt &&
        touch /venv/.ready &&
        /venv/bin/alembic upgrade head &&
        /venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  worker:
    image: python:3.12-slim
    restart: unless-stopped
    working_dir: /app
    env_file: ${PROJECT_BASE_PATH}/.env
    environment:
      VIRTUAL_ENV: /venv
      PATH: /venv/bin:/usr/local/bin:/usr/bin:/bin
    volumes:
      - ${PROJECT_BASE_PATH}/${BACKEND_BASE_PATH}:/app
      - ${PROJECT_BASE_PATH}/${PYTHON_ENV_PATH}:/venv
      - ${PROJECT_BASE_PATH}${IMPORT_BASE_PATH}:${IMPORT_BASE_PATH}
      - ${PROJECT_BASE_PATH}${STORAGE_PATH}:${STORAGE_PATH}
      - ${PROJECT_BASE_PATH}${EXPORT_BASE_PATH}:${EXPORT_BASE_PATH}
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        until [ -f /venv/.ready ]; do echo 'Warte auf Backend-venv...'; sleep 2; done &&
        /venv/bin/uvicorn app.worker.main:app --host 0.0.0.0 --port 8000 --reload
      "

  frontend:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /app
    env_file: ${PROJECT_BASE_PATH}/.env
    volumes:
      - ${PROJECT_BASE_PATH}/${FRONTEND_BASE_PATH}:/app
      - ${PROJECT_BASE_PATH}/${NODE_MODULES_PATH}:/app/node_modules
    ports:
      - "${FRONTEND_PORT}:3000"
    depends_on:
      - backend
    command: >
      sh -c "
        rm -rf /app/.next;
        find /app/src /app -maxdepth 4 -type d -name '@eaDir' 2>/dev/null |
          xargs -I{} sh -c 'echo \"export default function Default() { return null; }\" > {}/default.js';
        npm install --prefer-offline 2>/dev/null || npm install;
        npm run dev
      "
